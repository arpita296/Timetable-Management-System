<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Timetable Management</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <h2>Welcome Back</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Login</button>
    <p>Don’t have an account? <a href="#" id="signupLink">Sign up</a></p>
  </div>

  <div class="auth-container hidden" id="signupContainer">
    <h2>Create Account</h2>
    <input type="text" id="newUser" placeholder="Choose Username">
    <input type="password" id="newPass" placeholder="Choose Password">
    <button id="signupBtn">Sign Up</button>
    <p>Already have an account? <a href="#" id="loginLink">Login</a></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
